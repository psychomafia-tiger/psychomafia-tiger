<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120" viewBox="0 0 600 120">
  <rect width="600" height="120" fill="#0d1117"/>
  <!-- Glitch layer red: offset right/up -->
  <text x="300" y="67" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="36" font-weight="900"
    letter-spacing="4" fill="#ff0040" opacity="0.6"
    transform="translate(2, -1)">psychomafia.tiger</text>
  <!-- Glitch layer blue: offset left/down -->
  <text x="300" y="67" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="36" font-weight="900"
    letter-spacing="4" fill="#0040ff" opacity="0.6"
    transform="translate(-2, 1)">psychomafia.tiger</text>
  <!-- Main white text on top -->
  <text x="300" y="67" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="36" font-weight="900"
    letter-spacing="4" fill="#ffffff">psychomafia.tiger</text>
  <!-- Tagline below -->
  <text x="300" y="90" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="12"
    letter-spacing="3" fill="#8b949e">build. ship. repeat.</text>
</svg>
